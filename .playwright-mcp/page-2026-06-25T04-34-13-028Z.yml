        - paragraph [ref=e56]: At Singapore International School, we provide a structured academic pathway from Early Childhood Education through to internationally recognised O-Level and A-Level qualifications. As an approved Pearson Edexcel centre, our curriculum combines rigorous academic standards with hands-on, inquiry-based learning. We focus on the individual learner at every grade level, nurturing curiosity, critical thinking, and a lifelong love of learning. Our goal is to provide students with all essential elements in the learning process through a hands-on, inquiry-based, learning through discovery philosophy. Students accept the challenges of open-ended problem-solving activities, effective communication, leadership, understanding and responsibility.
